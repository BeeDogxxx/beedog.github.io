<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的足迹 | 蜜蜂狗BeeDog的说明书</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans SC', 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%);
            min-height: 100vh;
            color: #ffffff;
            overflow-x: hidden;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            text-align: center;
            padding: 60px 0 40px;
            position: relative;
        }

        .header h1 {
            font-size: 48px;
            font-weight: 700;
            background: linear-gradient(135deg, #D4AF37 0%, #f4e4a6 50%, #D4AF37 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 2px 20px rgba(212, 175, 55, 0.3);
            margin-bottom: 20px;
            letter-spacing: 4px;
        }

        .header p {
            font-size: 18px;
            color: #888;
            max-width: 600px;
            margin: 0 auto;
            line-height: 1.8;
        }

        .header::after {
            content: '';
            display: block;
            width: 100px;
            height: 3px;
            background: linear-gradient(90deg, transparent, #D4AF37, transparent);
            margin: 30px auto 0;
        }

        .map-section {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 20px;
            padding: 40px;
            margin: 40px 0;
            backdrop-filter: blur(10px);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5),
                        inset 0 1px 0 rgba(255, 255, 255, 0.1);
        }

        .map-container {
            width: 100%;
            height: 600px;
            position: relative;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 10px;
            overflow: hidden;
            box-shadow: inset 0 0 100px rgba(212, 175, 55, 0.05);
        }

        #china-map {
            width: 100%;
            height: 100%;
        }

        .marker {
            position: absolute;
            width: 20px;
            height: 20px;
            background: #D4AF37;
            border-radius: 50%;
            cursor: pointer;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.8),
                        0 0 40px rgba(212, 175, 55, 0.4);
            transition: all 0.3s ease;
            z-index: 10;
        }

        .marker::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background: #D4AF37;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        .marker:hover {
            transform: translate(-50%, -50%) scale(1.5);
            box-shadow: 0 0 30px rgba(212, 175, 55, 1),
                        0 0 60px rgba(212, 175, 55, 0.6);
        }

        @keyframes pulse {
            0% {
                transform: scale(1);
                opacity: 1;
            }
            100% {
                transform: scale(2);
                opacity: 0;
            }
        }

        .marker-label {
            position: absolute;
            background: rgba(0, 0, 0, 0.9);
            color: #D4AF37;
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 14px;
            white-space: nowrap;
            pointer-events: none;
            transform: translate(-50%, -140%);
            border: 1px solid rgba(212, 175, 55, 0.3);
            opacity: 0;
            transition: opacity 0.3s ease;
            z-index: 11;
        }

        .marker:hover .marker-label {
            opacity: 1;
        }

        /* 省份轮廓高亮样式 */
        .province-sichuan,
        .province-zhejiang,
        .province-guangdong,
        .province-shanghai,
        .province-jiangsu,
        .province-shandong {
            fill: rgba(255, 215, 0, 0.4) !important;
            stroke: #FFD700 !important;
            stroke-width: 2 !important;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .province-sichuan:hover,
        .province-zhejiang:hover,
        .province-guangdong:hover,
        .province-shanghai:hover,
        .province-jiangsu:hover,
        .province-shandong:hover {
            fill: rgba(255, 215, 0, 0.6) !important;
            stroke-width: 3 !important;
            filter: drop-shadow(0 0 10px rgba(212, 175, 55, 0.8));
            animation: pulse 1.5s ease-in-out infinite;
        }


        @keyframes pulse {
            0%, 100% {
                filter: drop-shadow(0 0 10px rgba(212, 175, 55, 0.8));
            }
            50% {
                filter: drop-shadow(0 0 20px rgba(212, 175, 55, 1));
            }
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            justify-content: center;
            align-items: center;
            z-index: 1000;
            backdrop-filter: blur(5px);
        }

        .modal.active {
            display: flex;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        .modal-content {
            background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%);
            border: 2px solid #D4AF37;
            border-radius: 15px;
            padding: 40px;
            max-width: 600px;
            width: 90%;
            position: relative;
            box-shadow: 0 20px 60px rgba(212, 175, 55, 0.3);
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from {
                transform: translateY(50px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .modal-close {
            position: absolute;
            top: 15px;
            right: 15px;
            width: 30px;
            height: 30px;
            background: rgba(212, 175, 55, 0.2);
            border: none;
            color: #D4AF37;
            font-size: 20px;
            cursor: pointer;
            border-radius: 50%;
            transition: all 0.3s ease;
        }

        .modal-close:hover {
            background: rgba(212, 175, 55, 0.4);
            transform: rotate(90deg);
        }

        .modal-title {
            font-size: 28px;
            color: #D4AF37;
            margin-bottom: 20px;
            font-weight: 600;
        }

        .modal-description {
            color: #ccc;
            line-height: 1.8;
            font-size: 16px;
        }

        .modal-image {
            width: 100%;
            height: 200px;
            background: rgba(212, 175, 55, 0.1);
            border-radius: 10px;
            margin: 20px 0;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px dashed rgba(212, 175, 55, 0.3);
        }

        .modal-image span {
            color: #D4AF37;
            font-size: 14px;
        }

        .travel-list {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin: 40px 0;
        }

        .travel-card {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 15px;
            padding: 30px;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        .travel-card:hover {
            transform: translateY(-5px);
            border-color: rgba(212, 175, 55, 0.5);
            box-shadow: 0 10px 30px rgba(212, 175, 55, 0.2);
        }

        .travel-card h3 {
            color: #D4AF37;
            font-size: 22px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .travel-card h3::before {
            content: '📍';
        }

        .travel-card p {
            color: #888;
            line-height: 1.8;
            font-size: 14px;
        }

        
        .stats-section {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin: 40px 0;
        }

        .stat-card {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 15px;
            padding: 30px;
            text-align: center;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            border-color: rgba(212, 175, 55, 0.5);
            box-shadow: 0 10px 30px rgba(212, 175, 55, 0.2);
        }

        .stat-number {
            font-size: 48px;
            font-weight: 700;
            background: linear-gradient(135deg, #D4AF37 0%, #f4e4a6 50%, #D4AF37 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
        }

        .stat-label {
            color: #888;
            font-size: 16px;
        }

        /* 省份提示框样式 */
        .province-tooltip {
            position: absolute;
            background: rgba(0, 0, 0, 0.95);
            color: #D4AF37;
            padding: 12px 20px;
            border-radius: 8px;
            font-size: 14px;
            white-space: nowrap;
            pointer-events: none;
            z-index: 100;
            border: 1px solid rgba(212, 175, 55, 0.3);
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.5);
            opacity: 0;
            transition: opacity 0.3s ease, transform 0.3s ease;
            transform: translateY(10px);
        }

        .province-tooltip.show {
            opacity: 1;
            transform: translateY(0);
        }

        .province-tooltip .tooltip-title {
            font-weight: 600;
            margin-bottom: 5px;
            font-size: 16px;
        }

        .province-tooltip .tooltip-info {
            color: #aaa;
            font-size: 12px;
        }

        /* 图例样式 */
        .map-legend {
            display: flex;
            align-items: center;
            gap: 30px;
            margin-top: 20px;
            padding: 15px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 10px;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #888;
            font-size: 14px;
        }

        .legend-color {
            width: 20px;
            height: 20px;
            border-radius: 4px;
        }

        .legend-color.visited {
            background: rgba(255, 215, 0, 0.4);
            border: 2px solid #FFD700;
        }

        .legend-color.unvisited {
            background: transparent;
            border: 1px solid rgba(212, 175, 55, 0.2);
        }

        /* 页面加载动画 */
        .page-loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.5s ease, visibility 0.5s ease;
        }

        .page-loader.hidden {
            opacity: 0;
            visibility: hidden;
        }

        .loader-content {
            text-align: center;
        }

        .loader-spinner {
            width: 60px;
            height: 60px;
            border: 3px solid rgba(212, 175, 55, 0.2);
            border-top-color: #D4AF37;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .loader-text {
            color: #D4AF37;
            font-size: 18px;
            letter-spacing: 2px;
        }

        /* 底部省份列表 */
        .province-list {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin: 40px 0;
            padding: 30px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 20px;
            backdrop-filter: blur(10px);
        }

        .province-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 15px 20px;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(212, 175, 55, 0.1);
            border-radius: 10px;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .province-item:hover {
            background: rgba(212, 175, 55, 0.1);
            border-color: rgba(212, 175, 55, 0.4);
            transform: translateY(-3px);
            box-shadow: 0 5px 20px rgba(212, 175, 55, 0.2);
        }

        .province-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #D4AF37, #f4e4a6);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            flex-shrink: 0;
        }

        .province-info {
            flex: 1;
        }

        .province-name {
            font-size: 16px;
            font-weight: 600;
            color: #D4AF37;
            margin-bottom: 5px;
        }

        .province-cities {
            font-size: 12px;
            color: #888;
            line-height: 1.4;
        }

        /* ============================================
           返回首页按钮样式
           ============================================ */
        .back-btn {
            display: inline-flex;
            align-items: center;
            padding: 12px 24px;
            background: rgba(212, 175, 55, 0.1);
            border: 1px solid rgba(212, 175, 55, 0.3);
            border-radius: 8px;
            color: #D4AF37;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s ease;
            cursor: pointer;
            margin: 20px 0;
        }

        .back-btn:hover {
            background: rgba(212, 175, 55, 0.2);
            border-color: #D4AF37;
            color: #f4e4a6;
            transform: translateX(-5px);
            box-shadow: 0 4px 12px rgba(212, 175, 55, 0.2);
        }

        .back-btn:active {
            transform: translateX(-3px);
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 36px;
                letter-spacing: 2px;
            }

            .header p {
                font-size: 16px;
                padding: 0 20px;
            }

            .map-container {
                height: 400px;
            }

            .travel-list {
                grid-template-columns: 1fr;
            }

            .modal-content {
                padding: 30px 20px;
            }

            .modal-title {
                font-size: 24px;
            }
        }
    
        /* 粒子背景特效 */
        #particle-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
        }

        /* 星星闪烁特效 */
        .star {
            position: fixed;
            width: 2px;
            height: 2px;
            background: #D4AF37;
            border-radius: 50%;
            animation: twinkle 3s ease-in-out infinite;
            pointer-events: none;
            z-index: -1;
        }

        @keyframes twinkle {
            0%, 100% {
                opacity: 0.3;
                transform: scale(1);
            }
            50% {
                opacity: 1;
                transform: scale(1.2);
            }
        }

        /* 流星特效 */
        .meteor {
            position: fixed;
            width: 100px;
            height: 2px;
            background: linear-gradient(90deg, #D4AF37, transparent);
            animation: meteor 5s linear infinite;
            pointer-events: none;
            z-index: -1;
            opacity: 0;
        }

        @keyframes meteor {
            0% {
                transform: translateX(0) translateY(0);
                opacity: 0;
            }
            5% {
                opacity: 1;
            }
            15% {
                transform: translateX(300px) translateY(300px);
                opacity: 0;
            }
            100% {
                opacity: 0;
            }
        }

        /* 波浪动画背景 */
        .wave-container {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            overflow: hidden;
            pointer-events: none;
        }

        .wave {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 200%;
            height: 200px;
            background: linear-gradient(90deg, 
                transparent 0%, 
                rgba(212, 175, 55, 0.03) 50%, 
                transparent 100%);
            animation: wave 8s ease-in-out infinite;
        }

        .wave:nth-child(2) {
            animation-delay: -2s;
            opacity: 0.5;
        }

        .wave:nth-child(3) {
            animation-delay: -4s;
            opacity: 0.3;
        }

        @keyframes wave {
            0%, 100% {
                transform: translateX(0) translateY(0);
            }
            50% {
                transform: translateX(-50%) translateY(-20px);
            }
        }

        /* 页面标题浮动动画 */
        .header h1 {
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-10px);
            }
        }

        /* 统计卡片入场动画 */
        .stat-card {
            animation: fadeInUp 0.8s ease-out forwards;
            opacity: 0;
        }

        .stat-card:nth-child(1) { animation-delay: 0.2s; }
        .stat-card:nth-child(2) { animation-delay: 0.4s; }
        .stat-card:nth-child(3) { animation-delay: 0.6s; }
        .stat-card:nth-child(4) { animation-delay: 0.8s; }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* 地图容器光晕特效 */
        .map-container {
            position: relative;
        }

        .map-container::before {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            background: linear-gradient(45deg, 
                #D4AF37, 
                #f4e4a6, 
                #D4AF37, 
                #aa8c2c);
            border-radius: 12px;
            z-index: -1;
            animation: glow 3s ease-in-out infinite;
            opacity: 0.08;
        }

        @keyframes glow {
            0%, 100% {
                opacity: 0.06;
                filter: blur(2px);
            }
            50% {
                opacity: 0.1;
                filter: blur(3px);
            }
        }

        /* 金色光点飘动 */
        .gold-particle {
            position: fixed;
            width: 4px;
            height: 4px;
            background: #D4AF37;
            border-radius: 50%;
            pointer-events: none;
            z-index: -1;
            animation: floatParticle 8s ease-in-out infinite;
            box-shadow: 0 0 10px #D4AF37;
        }

        @keyframes floatParticle {
            0% {
                transform: translateY(100vh) translateX(0) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(-100vh) translateX(100px) rotate(360deg);
                opacity: 0;
            }
        }

</style>
</head>
<body>

    <canvas id="particle-canvas"></canvas>

    <!-- 页面加载动画 -->
    <div class="page-loader" id="page-loader">
        <div class="loader-content">
            <div class="loader-spinner"></div>
            <div class="loader-text">加载中...</div>
        </div>
    </div>

                <div class="stat-number" id="stat-cities">21</div>
                <div class="stat-label">探索城市</div>

                <div class="stat-number" id="stat-years">3</div>
                <div class="stat-label">旅行年份</div>

                <div class="stat-number" id="stat-days">365+</div>
                <div class="stat-label">旅行天数</div>

                description: '四川是一个充满魅力的地方,既有壮丽的自然风光,又有深厚的历史文化。在成都,你可以品尝正宗的川菜,感受悠闲的茶馆文化;九寨沟的五彩池会让你惊叹大自然的鬼斧神工;乐山大佛则展示了古代工匠的智慧与匠心。',
                cities: '成都、九寨沟、乐山大佛'
            },
            zhejiang: {
                title: '浙江省',
                description: '浙江以水乡著称,西湖的美景让人流连忘返,"上有天堂,下有苏杭"名不虚传。乌镇的古朴建筑和宁静水道让你仿佛穿越回古代;千岛湖的碧波荡漾和清新空气是放松身心的绝佳去处。',
                cities: '杭州西湖、乌镇、千岛湖'
            },
            guangdong: {
                title: '广东省',
                description: '广东是中国改革开放的前沿阵地,既有繁华的都市景观,又有独特的岭南文化。广州的早茶文化让人流连忘返,深圳的科技发展令人震撼,珠海的浪漫海滨风光适合度假放松。',
                cities: '广州、深圳、珠海'
            },
            shanghai: {
                title: '上海市',
                description: '上海是中国的经济中心,汇聚了东西方文化的精髓。外滩的万国建筑博览群展现着历史的厚重,陆家嘴的摩天楼群彰显着现代的繁华。田子坊的文艺气息、豫园的古典韵味,都让人流连忘返。',
                cities: '外滩、陆家嘴、田子坊'
            },
            jiangsu: {
                title: '江苏省',
                description: '江苏是江南文化的代表,既有"上有天堂,下有苏杭"的美誉,又有浓厚的历史底蕴。苏州园林的精致典雅、南京古城的历史沧桑、扬州瘦西湖的诗情画意,都让人感受到江南的独特魅力。',
                cities: '苏州、南京、扬州'
            },
            shandong: {
                title: '山东省',
                description: '山东是孔孟之乡,儒家文化的发源地,也是泰山所在地。登泰山而小天下,感受五岳之首的雄伟壮丽;在曲阜拜谒孔庙孔府,感受千年儒学的博大精深;青岛的海滨风光和啤酒文化也别具一格。',
                cities: '泰山、曲阜、青岛'
            }
        };

        // 省份轮廓点击交互
        const provincePaths = document.querySelectorAll('.province-sichuan, .province-zhejiang, .province-guangdong, .province-shanghai, .province-jiangsu, .province-shandong');
        const modal = document.getElementById('modal');
        const modalClose = document.getElementById('modal-close');
        const modalTitle = document.getElementById('modal-title');
        const modalDescription = document.getElementById('modal-description');

        provincePaths.forEach(path => {
            path.addEventListener('click', () => {
                // 从class中获取省份名称
                let province = null;
                if (path.classList.contains('province-sichuan')) province = 'sichuan';
                else if (path.classList.contains('province-zhejiang')) province = 'zhejiang';
                else if (path.classList.contains('province-guangdong')) province = 'guangdong';
                else if (path.classList.contains('province-shanghai')) province = 'shanghai';
                else if (path.classList.contains('province-jiangsu')) province = 'jiangsu';
                else if (path.classList.contains('province-shandong')) province = 'shandong';
                const data = provinceData[province];
                
                if (data) {
                    modalTitle.textContent = data.title;
                    modalDescription.innerHTML = `
                        ${data.cities}<br><br>
                        
                        ${data.description}
                    `;
                    modal.classList.add('active');
                }
            });
        });

        modalClose.addEventListener('click', () => {
            modal.classList.remove('active');
        });

        modal.addEventListener('click', (e) => {
            if (e.target === modal) {
                modal.classList.remove('active');
            }
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && modal.classList.contains('active')) {
                modal.classList.remove('active');
            }
        });

        const observerOptions = {
            threshold: 0.1,
            rootMargin: '0px 0px -100px 0px'
        };

        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.style.opacity = '1';
                    entry.target.style.transform = 'translateY(0)';
                }
            });
        }, observerOptions);

        document.querySelectorAll('.travel-card').forEach(card => {
            card.style.opacity = '0';
            card.style.transform = 'translateY(30px)';
            card.style.transition = 'all 0.6s ease';
            observer.observe(card);
        });

        // 页面加载动画
        window.addEventListener('load', () => {
            const loader = document.getElementById('page-loader');
            setTimeout(() => {
                loader.classList.add('hidden');
            }, 800);
        });

        // 省份悬停提示功能
        const tooltip = document.getElementById('province-tooltip');
        const tooltipTitle = tooltip.querySelector('.tooltip-title');
        const tooltipInfo = tooltip.querySelector('.tooltip-info');

        provincePaths.forEach(path => {
            path.addEventListener('mouseenter', (e) => {
                let province = null;
                if (path.classList.contains('province-sichuan')) province = 'sichuan';
                else if (path.classList.contains('province-zhejiang')) province = 'zhejiang';
                else if (path.classList.contains('province-guangdong')) province = 'guangdong';
                else if (path.classList.contains('province-shanghai')) province = 'shanghai';
                else if (path.classList.contains('province-jiangsu')) province = 'jiangsu';
                else if (path.classList.contains('province-shandong')) province = 'shandong';
                
                const data = provinceData[province];
                if (data) {
                    tooltipTitle.textContent = data.title;
                    tooltipInfo.textContent = `${data.cities}`;
                    tooltip.classList.add('show');
                }
            });

            path.addEventListener('mousemove', (e) => {
                const mapContainer = document.getElementById('map-container');
                const rect = mapContainer.getBoundingClientRect();
                const x = e.clientX - rect.left + 15;
                const y = e.clientY - rect.top + 15;
                
                tooltip.style.left = `${x}px`;
                tooltip.style.top = `${y}px`;
            });

            path.addEventListener('mouseleave', () => {
                tooltip.classList.remove('show');
            });
        });

        // 统计数字动画
        function animateNumber(element, target, duration = 2000) {
            const start = 0;
            const startTime = performance.now();
            
            function update(currentTime) {
                const elapsed = currentTime - startTime;
                const progress = Math.min(elapsed / duration, 1);
                
                // 使用缓动函数 easeOutExpo
                const easeOut = progress === 1 ? 1 : 1 - Math.pow(2, -10 * progress);
                const current = Math.floor(start + (target - start) * easeOut);
                
                element.textContent = current + (element.id === 'stat-days' ? '+' : '');
                
                if (progress < 1) {
                    requestAnimationFrame(update);
                }
            }
            
            requestAnimationFrame(update);
        }

        // 当统计卡片进入视口时触发动画
        const statsObserver = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    const statCards = entry.target.querySelectorAll('.stat-card');
                    
                    animateNumber(document.getElementById('stat-provinces'), 6);
                    animateNumber(document.getElementById('stat-cities'), 18);
                    animateNumber(document.getElementById('stat-years'), 3);
                    animateNumber(document.getElementById('stat-days'), 365);
                    
                    statsObserver.unobserve(entry.target);
                }
            });
        }, { threshold: 0.5 });

        const statsSection = document.querySelector('.stats-section');
        if (statsSection) {
            statsObserver.observe(statsSection);
        }
    
        // ===== 粒子背景特效 =====
        const particleCanvas = document.getElementById('particle-canvas');
        const ctx = particleCanvas.getContext('2d');
        
        particleCanvas.width = window.innerWidth;
        particleCanvas.height = window.innerHeight;
        
        const particles = [];
        const particleCount = 50;
        
        class Particle {
            constructor() {
                this.reset();
            }
            
            reset() {
                this.x = Math.random() * particleCanvas.width;
                this.y = Math.random() * particleCanvas.height;
                this.size = Math.random() * 3 + 1;
                this.speedX = (Math.random() - 0.5) * 0.5;
                this.speedY = (Math.random() - 0.5) * 0.5;
                this.opacity = Math.random() * 0.5 + 0.2;
            }
            
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                
                if (this.x < 0 || this.x > particleCanvas.width) this.speedX *= -1;
                if (this.y < 0 || this.y > particleCanvas.height) this.speedY *= -1;
            }
            
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(212, 175, 55, ${this.opacity})`;
                ctx.fill();
            }
        }
        
        // 初始化粒子
        for (let i = 0; i < particleCount; i++) {
            particles.push(new Particle());
        }
        
        function animateParticles() {
            ctx.clearRect(0, 0, particleCanvas.width, particleCanvas.height);
            
            particles.forEach(particle => {
                particle.update();
                particle.draw();
            });
            
            // 绘制连线
            particles.forEach((p1, i) => {
                particles.slice(i + 1).forEach(p2 => {
                    const dx = p1.x - p2.x;
                    const dy = p1.y - p2.y;
                    const distance = Math.sqrt(dx * dx + dy * dy);
                    
                    if (distance < 150) {
                        ctx.beginPath();
                        ctx.moveTo(p1.x, p1.y);
                        ctx.lineTo(p2.x, p2.y);
                        ctx.strokeStyle = `rgba(212, 175, 55, ${0.1 * (1 - distance / 150)})`;
                        ctx.stroke();
                    }
                });
            });
            
            requestAnimationFrame(animateParticles);
        }
        
        animateParticles();
        
        // 窗口大小改变时调整画布
        window.addEventListener('resize', () => {
            particleCanvas.width = window.innerWidth;
            particleCanvas.height = window.innerHeight;
        });
        
        // ===== 星星闪烁特效 =====
        function createStars() {
            for (let i = 0; i < 30; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.left = Math.random() * 100 + 'vw';
                star.style.top = Math.random() * 100 + 'vh';
                star.style.animationDelay = Math.random() * 3 + 's';
                star.style.animationDuration = (Math.random() * 2 + 2) + 's';
                document.body.appendChild(star);
            }
        }
        
        createStars();
        
        // ===== 流星特效 =====
        function createMeteor() {
            const meteor = document.createElement('div');
            meteor.className = 'meteor';
            meteor.style.left = Math.random() * 100 + 'vw';
            meteor.style.top = Math.random() * 50 + 'vh';
            meteor.style.animationDelay = Math.random() * 5 + 's';
            document.body.appendChild(meteor);
            
            setTimeout(() => {
                meteor.remove();
            }, 5000);
        }
        
        // 每3秒创建一个流星
        setInterval(createMeteor, 3000);
        
        // ===== 波浪背景 =====
        const waveContainer = document.createElement('div');
        waveContainer.className = 'wave-container';
        for (let i = 0; i < 3; i++) {
            const wave = document.createElement('div');
            wave.className = 'wave';
            waveContainer.appendChild(wave);
        }
        document.body.insertBefore(waveContainer, document.body.firstChild);
        
        // ===== 金色光点飘动 =====
        function createGoldParticle() {
            const particle = document.createElement('div');
            particle.className = 'gold-particle';
            particle.style.left = Math.random() * 100 + 'vw';
            particle.style.animationDuration = (Math.random() * 5 + 6) + 's';
            particle.style.animationDelay = Math.random() * 2 + 's';
            document.body.appendChild(particle);
            
            setTimeout(() => {
                particle.remove();
            }, 8000);
        }
        
        // 每2秒创建一个金色光点
        setInterval(createGoldParticle, 2000);
        
        // 立即创建几个光点
        for (let i = 0; i < 5; i++) {
            setTimeout(createGoldParticle, i * 400);
        }


        // 底部省份列表点击交互
        document.querySelectorAll('.province-item').forEach(item => {
            item.addEventListener('click', () => {
                const province = item.dataset.province;
                const path = document.querySelector(`.province-${province}`);
                
                if (path) {
                    path.click();
                    // 滚动到地图位置
                    path.scrollIntoView({ behavior: 'smooth', block: 'center' });
                }
            });
        });

</script>
</body>
</html>
