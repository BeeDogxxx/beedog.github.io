<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar">
        <div class="container">
            <div class="nav-brand">
                <a href="index.html">
                    <span class="brand-icon">🐝</span>
                    <span class="brand-text">BeeDog</span>

            </div>
            <ul class="nav-menu">
                <li><a href="index.html">首页</a></li>
                <li><a href="about.html">关于我</a></li>

            <div class="hamburger">
                <span></span>
                <span></span>

            </div>
        </div>

    <!-- 页面标题 -->
    <section class="page-header">
        <div class="container">
            <h1 class="page-title">联系方式</h1>
            <p class="page-subtitle">Contact</p>
            <p class="page-description">期待与你交流与合作</p>
        </div>
    </section>

    <!-- 联系内容 -->
    <section class="contact-section">
        <div class="container">
            <div class="contact-grid">
                <!-- 联系表单 -->
                <div class="contact-form-wrapper">
                    <h2 class="form-title">发送消息</h2>
                    <form class="contact-form" onsubmit="handleSubmit(event)">
                        <div class="form-group">
                            <label for="name">姓名 *</label>
                            <input type="text" id="name" name="name" required placeholder="请输入您的姓名">
                        </div>
                        <div class="form-group">
                            <label for="email">邮箱 *</label>
                            <input type="email" id="email" name="email" required placeholder="请输入您的邮箱">
                        </div>
                        <div class="form-group">
                            <label for="subject">主题</label>
                            <input type="text" id="subject" name="subject" placeholder="请输入消息主题">
                        </div>
                        <div class="form-group">
                            <label for="message">留言 *</label>
                            <textarea id="message" name="message" rows="6" required placeholder="请输入您的留言内容..."></textarea>
                        </div>
                        <button type="submit" class="submit-btn">
                            <span>发送消息</span>
                            <span class="btn-icon">→</span>
                        </button>
                    </form>
                </div>

                <!-- 联系信息 -->
                <div class="contact-info-wrapper">
                    <h2 class="info-title">联系信息</h2>
                    
                    <div class="contact-info-item">
                        <div class="contact-icon">📧</div>
                        <div class="contact-details">
                            <h3>邮箱</h3>
                            <a href="mailto:s1870567841@163.com">s1870567841@163.com</a>
                        </div>
                    </div>

                    <div class="contact-info-item">
                        <div class="contact-icon">📱</div>
                        <div class="contact-details">
                            <h3>电话</h3>
                            <a href="tel:19357505597">19357505597</a>
                        </div>
                    </div>

                    <div class="contact-info-item">
                        <div class="contact-icon">📍</div>
                        <div class="contact-details">
                            <h3>位置</h3>
                            <p>杭州，中国</p>
                        </div>
                    </div>

                    <div class="contact-divider"></div>

                    <div class="quick-links">
                        <h3>快速链接</h3>
                        <div class="link-grid">
                            <a href="index.html" class="quick-link-item">
                                <span class="link-icon">🏠</span>
                                <span>首页</span>
                            </a>
                            <a href="about.html" class="quick-link-item">
                                <span class="link-icon">👤</span>
                                <span>关于我</span>
                            </a>
                            <a href="portfolio.html" class="quick-link-item">
                                <span class="link-icon">💼</span>
                                <span>作品集</span>
                            </a>
                            <a href="blog.html" class="quick-link-item">
                                <span class="link-icon">📝</span>
                                <span>博客</span>
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- 页脚 -->
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-brand">
                    <span class="brand-icon">🐝</span>
                    <span class="brand-text">BeeDog</span>
                </div>
                <p class="footer-description">蜜蜂狗BeeDog的说明书 - 探索AI与电商的无限可能</p>
                <div class="footer-links">
                    <a href="index.html">首页</a>
                    <a href="about.html">关于我</a>
                    <a href="portfolio.html">作品集</a>
                    <a href="blog.html">博客</a>
                    <a href="travel.html">我去过的地方</a>
                    <a href="contact.html">联系方式</a>
                </div>
                <p class="footer-copyright">© 2025 苏笔辉. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <script>
        // 表单提交处理
        function handleSubmit(event) {
            event.preventDefault();
            
            const formData = {
                name: document.getElementById('name').value,
                email: document.getElementById('email').value,
                subject: document.getElementById('subject').value,
                message: document.getElementById('message').value
            };
            
            // 这里是演示，实际使用时需要连接后端API
            alert(`感谢您的留言，${formData.name}！\n\n我会尽快回复您的消息。\n\n（演示版本，实际使用时需要连接后端API）`);
            
            // 清空表单
            document.getElementById('name').value = '';
            document.getElementById('email').value = '';
            document.getElementById('subject').value = '';
            document.getElementById('message').value = '';
        }

        // 加载主脚本
        // 注意：由于这是一个静态页面，暂时不加载完整的main.js，避免冲突
        console.log('🐝 蜜蜂狗BeeDog的说明书 联系方式页面已加载！');
    </script>
</body>
</html>
