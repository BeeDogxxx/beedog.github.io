<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 400" width="300" height="400">
  <defs>
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D4AF37;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#F4CF57;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D4AF37;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- 背景 -->
  <rect width="300" height="400" fill="#1a1a1a" stroke="url(#goldGradient)" stroke-width="2" rx="10"/>

  <!-- 书籍图标 -->
  <g transform="translate(75, 100)">
    <!-- 书本左侧 -->
    <path d="M0 0 L75 10 L75 180 L0 170 Z" fill="#2a2a2a" stroke="#D4AF37" stroke-width="1"/>
    <!-- 书本右侧 -->
    <path d="M75 10 L150 0 L150 170 L75 180 Z" fill="#1a1a1a" stroke="#D4AF37" stroke-width="1"/>
    <!-- 书脊 -->
    <line x1="75" y1="10" x2="75" y2="180" stroke="#D4AF37" stroke-width="2"/>
    <!-- 书页纹理 -->
    <line x1="10" y1="30" x2="65" y2="35" stroke="#D4AF37" stroke-width="0.5" opacity="0.3"/>
    <line x1="10" y1="60" x2="65" y2="65" stroke="#D4AF37" stroke-width="0.5" opacity="0.3"/>
    <line x1="10" y1="90" x2="65" y2="95" stroke="#D4AF37" stroke-width="0.5" opacity="0.3"/>
    <line x1="85" y1="35" x2="140" y2="30" stroke="#D4AF37" stroke-width="0.5" opacity="0.3"/>
    <line x1="85" y1="65" x2="140" y2="60" stroke="#D4AF37" stroke-width="0.5" opacity="0.3"/>
    <line x1="85" y1="95" x2="140" y2="90" stroke="#D4AF37" stroke-width="0.5" opacity="0.3"/>
  </g>

  <!-- 文字提示 -->
  <text x="150" y="320" text-anchor="middle" fill="#D4AF37" font-size="16" font-family="sans-serif">
    封面图片
  </text>
  <text x="150" y="345" text-anchor="middle" fill="#888888" font-size="12" font-family="sans-serif">
    Book Cover
  </text>

  <!-- 装饰元素 -->
  <circle cx="150" cy="365" r="5" fill="url(#goldGradient)" opacity="0.5"/>
</svg>
